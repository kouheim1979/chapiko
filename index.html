<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>チャピ子 表示中継</title>
<style>
  html, body { margin:0; padding:0; background:#fff; color:#000; }
  body { font-family: serif; font-size: 22px; line-height: 1.55; }
  #app { max-width: 900px; margin: 0 auto; padding: 12px; }
  h1 { font-size: 30px; margin: 8px 0 12px; }
  .box { border: 2px solid #000; padding: 12px; margin: 10px 0; }
  .btn { display:block; border: 3px solid #000; padding: 14px; margin: 12px 0; color:#000; text-decoration:none; font-weight:bold; text-align:center; font-size: 24px; }
  .small { font-size: 16px; }
  iframe { width:100%; height: 72vh; border: 2px solid #000; background:#fff; }
</style>
</head>
<body>
<div id="app">
  <h1>チャピ子 表示中継</h1>

  <div class="box">
    <a class="btn" href="https://chatgpt.com/" target="_self">チャピ子を開く</a>
    <a class="btn" href="https://chatgpt.com/?model=auto" target="_self">新しいチャットを開く</a>
    <div class="small">
      Kindleでこのページをブックマークしておくための軽い中継ページです。APIキーや中継サーバーは使いません。
    </div>
  </div>

  <div class="box">
    <div class="small">
      下に画面が出ればそのまま使えます。出ない場合は、上の「チャピ子を開く」を押してください。
    </div>
    <iframe src="https://chatgpt.com/" title="ChatGPT"></iframe>
  </div>
</div>
</body>
</html>
