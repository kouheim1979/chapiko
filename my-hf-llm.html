<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>自分専用LLM チャピ子</title>
<style>
  html, body { margin:0; padding:0; background:#fff; color:#000; }
  body { font-family:sans-serif; font-size:20px; line-height:1.55; }
  #app { max-width:1000px; margin:0 auto; padding:12px; }
  h1 { font-size:30px; margin:8px 0 12px; }
  h2 { font-size:23px; margin:10px 0 6px; }
  .box { border:2px solid #000; padding:12px; margin:10px 0; }
  .warn { border:2px dashed #000; padding:10px; margin:10px 0; }
  input, textarea, button, select { width:100%; box-sizing:border-box; font-size:20px; border:2px solid #000; background:#fff; color:#000; padding:8px; margin:5px 0; }
  textarea { height:120px; }
  button { font-weight:bold; padding:12px; }
  .small { font-size:15px; }
  .tiny { font-size:13px; }
  .result { white-space:pre-wrap; word-break:break-word; border-top:1px solid #000; padding-top:10px; }
  a { color:#000; }
</style>
</head>
<body>
<div id="app">
  <h1>自分専用LLM チャピ子</h1>

  <div class="box small">
    Hugging Face Hubに置いたWebLLM/MLC形式モデルを、GitHub Pagesから読み込んでブラウザ内で動かすページです。APIキーは使いません。モデル本体はGitHubには置きません。
  </div>

  <div id="diag" class="warn small">診断: 未実行</div>

  <div class="box">
    <h2>1. モデル設定</h2>
    <label>Hugging FaceモデルURL</label>
    <input id="modelUrl" value="https://huggingface.co/mlc-ai/gemma3-1b-it-q4f16_1-MLC">

    <label>このページ内で呼ぶモデルID</label>
    <input id="modelId" value="chapiko-my-model">

    <label>ベースライブラリ</label>
    <select id="baseModelId">
      <option value="gemma3-1b-it-q4f16_1-MLC">Gemma3 1B q4f16</option>
      <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama 3.2 1B q4f16</option>
      <option value="Qwen2.5-0.5B-Instruct-q4f16_1-MLC">Qwen2.5 0.5B q4f16</option>
      <option value="Qwen2.5-1.5B-Instruct-q4f16_1-MLC">Qwen2.5 1.5B q4f16</option>
      <option value="SmolLM2-360M-Instruct-q4f32_1-MLC">SmolLM2 360M q4f32</option>
      <option value="Phi-3.5-mini-instruct-q4f16_1-MLC-1k">Phi 3.5 mini q4f16 1k</option>
      <option value="gemma-2-2b-jpn-it-q4f16_1-MLC">Gemma2 2B JPN q4f16</option>
    </select>

    <button onclick="saveSettings()">設定を保存</button>
    <button onclick="runDiag()">診断</button>
    <button onclick="loadModel()">モデルを読み込む</button>
    <div id="status" class="small">準備OK</div>
  </div>

  <div class="box">
    <h2>2. チャピ子設定</h2>
    <textarea id="systemPrompt">あなたはチャピ子です。日本語で、結論から、短く、読みやすく答えてください。Kouheiさん向けに、技術質問では現場のPLC・制御・ネットワークの例を入れてください。Kindleでも読みやすいように長くしすぎないでください。</textarea>
  </div>

  <div class="box">
    <h2>3. 質問</h2>
    <textarea id="prompt" placeholder="ここに質問を書く"></textarea>
    <button onclick="ask()">聞く</button>
    <button onclick="clearAnswer()">消去</button>
  </div>

  <div class="box">
    <h2>回答</h2>
    <div id="answer" class="result">ここに回答が出ます。</div>
  </div>

  <div class="box small">
    <b>重要:</b> Hugging Faceに置くモデルは、WebLLM/MLC形式である必要があります。GGUFファイルをそのまま置いただけでは、このページからは動きません。まずは初期値の公開モデルで動作確認してください。<br>
    <a href="./">トップへ戻る</a>
  </div>
</div>

<script>
const WEBLLM_URL = 'https://esm.run/@mlc-ai/web-llm';
let webllm = null;
let engine = null;
let loadedModelId = '';

loadSettings();
runDiag(false);

function loadSettings(){
  setVal('modelUrl', localStorage.getItem('chapiko_my_model_url') || val('modelUrl'));
  setVal('modelId', localStorage.getItem('chapiko_my_model_id') || val('modelId'));
  setVal('baseModelId', localStorage.getItem('chapiko_my_base_model_id') || val('baseModelId'));
  setVal('systemPrompt', localStorage.getItem('chapiko_my_system_prompt') || val('systemPrompt'));
}
function saveSettings(){
  localStorage.setItem('chapiko_my_model_url', val('modelUrl').trim());
  localStorage.setItem('chapiko_my_model_id', val('modelId').trim());
  localStorage.setItem('chapiko_my_base_model_id', val('baseModelId'));
  localStorage.setItem('chapiko_my_system_prompt', val('systemPrompt'));
  setStatus('保存しました');
}

async function runDiag(verbose=true){
  const lines = [];
  lines.push('HTTPS: ' + (location.protocol === 'https:' ? 'OK' : 'NG'));
  lines.push('JavaScript: OK');
  lines.push('Dynamic import: ' + (supportsDynamicImport() ? 'OK' : 'NG'));
  lines.push('WebGPU navigator.gpu: ' + (navigator.gpu ? 'OK' : 'NG'));
  if (navigator.gpu && verbose) {
    try {
      const adapter = await navigator.gpu.requestAdapter();
      lines.push('WebGPU adapter: ' + (adapter ? 'OK' : 'NG'));
    } catch(e) {
      lines.push('WebGPU adapter: エラー ' + errMsg(e));
    }
  }
  document.getElementById('diag').textContent = '診断:\n' + lines.join('\n');
}

function supportsDynamicImport(){
  try { new Function('return import("data:text/javascript,export default 1")'); return true; }
  catch(e){ return false; }
}

async function loadWebLLM(){
  if (webllm) return webllm;
  setStatus('WebLLM本体を読み込み中...');
  webllm = await import(WEBLLM_URL);
  return webllm;
}

async function loadModel(){
  saveSettings();
  if (!navigator.gpu) {
    setStatus('WebGPU非対応です。この端末ではWebLLMは動きません。');
    return;
  }
  try {
    const lib = await loadWebLLM();
    const modelUrl = val('modelUrl').trim();
    const modelId = val('modelId').trim() || 'chapiko-my-model';
    const baseModelId = val('baseModelId');

    const base = lib.prebuiltAppConfig.model_list.find(function(m){ return m.model_id === baseModelId; });
    if (!base) throw new Error('ベースライブラリが見つかりません: ' + baseModelId);

    const customRecord = {
      model: modelUrl,
      model_id: modelId,
      model_lib: base.model_lib,
      overrides: base.overrides,
      vram_required_MB: base.vram_required_MB,
      low_resource_required: base.low_resource_required,
      required_features: base.required_features
    };

    const appConfig = Object.assign({}, lib.prebuiltAppConfig, {
      model_list: [customRecord].concat(lib.prebuiltAppConfig.model_list),
      cacheBackend: 'cache'
    });

    setStatus('モデルを読み込み中... 初回はかなり時間がかかります');
    engine = new lib.MLCEngine({
      appConfig: appConfig,
      initProgressCallback: function(p){
        setStatus('読み込み中: ' + (p && p.text ? p.text : JSON.stringify(p)));
      }
    });
    await engine.reload(modelId);
    loadedModelId = modelId;
    setStatus('モデル読み込み完了: ' + loadedModelId);
  } catch(e) {
    setStatus('モデル読み込みエラー: ' + errMsg(e));
  }
}

async function ask(){
  const prompt = val('prompt').trim();
  if (!prompt) return setStatus('質問が空です');
  if (!engine) {
    setStatus('先にモデルを読み込んでください');
    return;
  }
  try {
    setStatus('回答中...');
    const messages = [
      { role:'system', content: val('systemPrompt') },
      { role:'user', content: prompt }
    ];
    const reply = await engine.chat.completions.create({
      messages: messages,
      temperature: 0.7,
      max_tokens: 512
    });
    const text = reply && reply.choices && reply.choices[0] && reply.choices[0].message ? reply.choices[0].message.content : '(返答なし)';
    document.getElementById('answer').textContent = text;
    setStatus('完了');
  } catch(e) {
    document.getElementById('answer').textContent = 'エラー: ' + errMsg(e);
    setStatus('回答エラー');
  }
}

function clearAnswer(){
  document.getElementById('answer').textContent = 'ここに回答が出ます。';
  setStatus('消去しました');
}
function val(id){ return document.getElementById(id).value; }
function setVal(id, value){ document.getElementById(id).value = value; }
function setStatus(s){ document.getElementById('status').textContent = s; }
function errMsg(e){ return e && e.message ? e.message : String(e); }
</script>
</body>
</html>
